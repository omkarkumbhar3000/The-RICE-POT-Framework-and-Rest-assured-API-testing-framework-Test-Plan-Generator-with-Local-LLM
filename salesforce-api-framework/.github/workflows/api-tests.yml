name: Salesforce API Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test Environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - uat
      suite:
        description: 'Test Suite'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - positive
          - negative
          - security
          - integration

jobs:
  api-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite: [positive, negative, security, integration]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: |
          SUITE=${{ github.event.inputs.suite || 'all' }}
          ENV=${{ github.event.inputs.environment || 'qa' }}
          if [ "$SUITE" == "all" ]; then
            mvn clean test -P${ENV} -DsuiteXmlFile=src/main/resources/testng.xml
          else
            mvn clean test -P${ENV} -DsuiteXmlFile=src/main/resources/testng.xml \
              -Dgroups=${SUITE}
          fi

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.suite }}
          path: target/site/allure-maven-plugin/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.suite }}
          path: target/surefire-reports/

      - name: Publish Test Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results ${{ matrix.suite }}
          path: target/surefire-reports/junitreports/*.xml
          reporter: java-junit
          fail-on-error: false
